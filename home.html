<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker Home Page</title>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- tailwind and daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fontawsome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
</head>

<body>
    <header>
        <nav class="flex justify-around items-center border-b border-[#E9E9E9] py-5">
            <div class="flex items-center gap-1">
                <img src="./assets/github-logo.png" alt="" class="w-10">
                <h2 class="text-[#1F2937] font-semibold text-2xl">GitHub Issues Tracker</h2>
            </div>
            <div>
                <div class="join">
                    <div>

                        <label class="input validator join-item">
                            <i class="fa-brands fa-sistrix"></i>
                            <input id="input-search" type="text" placeholder="Search issues..." required />
                        </label>

                    </div>
                    <button id="btn-search" class="btn btn-primary">+ New Issue</button>
                </div>
            </div>
        </nav>
    </header>


    <!-- main area -->
    <main class="w-11/12 mx-auto">
        <!-- section header -->
        <section class="mt-14">
            <div class="bg-[#F8FAFC] py-6 px-3 flex gap-3">
                <button id="btn-all" class="btn btn-primary">All</button>
                <button id="btn-open" class="btn btn-soft">Open</button>
                <button id="btn-closed" class="btn btn-soft">Closed</button>
            </div>

            <!-- left side -->
            <div class="flex justify-between py-6 px-3 bg-[#F8FAFC] mt-4">
                <div class="flex gap-2 items-center">
                    <img src="./assets/Aperture.png" alt="" class="h-8">
                    <div>
                        <h2 id="issue-count" class="text-[#1F2937] font-semibold text-xl"></h2>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>

                <!-- right side open closed -->
                <div class="flex">
                    <div class="flex items-center space-x-1">
                        <img src="./assets/Ellipse 2 (1).png" alt="" class="w-3 h-3">
                        <p>Open</p>
                    </div>
                    <div class="flex items-center space-x-1 ml-3">
                        <img src="./assets/Ellipse 2.png" alt="" class="w-3 h-3">
                        <p>Closed</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- card section -->
        <section id="card-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3 py-6 px-6">


            <!-- <div class="space-y-4 shadow-md p-4">
                <div class="flex justify-between">
                    <img src="./assets/Open-Status.png" alt="" class="h-6">
                    <button class="btn btn-outline btn-error">High</button>
                </div>

                <div>
                    <h2 class="font-semibold text-[#1F2937] line-clamp-2">Fix navigation menu on mobile devices</h2>
                    <p class="text-[#64748B] line-clamp-2">The navigation menu doesn't collapse properly on mobile devices...</p>
                </div>

                <div>
                    <button class="btn btn-active btn-error"><i class="fa-solid fa-bug"></i>Bug</button>
                    <button class="btn btn-active btn-warning"><i class="fa-solid fa-life-ring"></i>help wanted</button>
                </div>
                <hr class="text-gray-400">
                <div class="space-y-2">
                    <p class="text-[#64748B]">#1by john_doe</p>
                    <p class="text-[#64748B]">1/15/2024</p>
                </div>
            </div> -->
        </section>

        <div id="loading-spinner" class="hidden justify-center">
            <span class="loading loading-spinner loading-xl"></span>
        </div>

        <!-- details modal -->
        <dialog id="issue_card_details" class="modal">
            <div class="modal-box">
                <div class="space-y-4">

                    <h2 id="modal-title" class="font-bold text-[#1F2937] text-2xl"></h2>
                    <div class="space-y-4 flex gap-1">

                        <span id="modal-status" class="badge badge-outline badge-success"></span>
                        <span id="modal-author" class="text-[#64748B]"></span>
                        <span id="modal-date" class="text-[#64748B]"></span>

                    </div>

                    <div id="modal-labels" class="flex gap-2"></div>

                    <p id="modal-description" class="text-[#64748B]"></p>

                    <div class="bg-[#F8FAFC] flex justify-between px-2 py-2">
                        <div>
                            <p class="text-[#64748B]">Assignee:</p>
                            <h2 id="modal-assignee" class="text-[#1F2937] font-semibold"></h2>
                        </div>
                        <div>
                            <p class="text-[#64748B]">Priority:</p>
                            <span id="modal-priority" class="badge badge-soft badge-error"></span>
                        </div>
                    </div>
                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>

    </main>


    <script src="./main.js"></script>
</body>

</html>
